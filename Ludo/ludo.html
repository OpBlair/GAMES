<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ludo | Multiplayer Game</title>
    <link rel="stylesheet" href="ludo.css">
    <script defer src="ludo.js"></script>
</head>
<body>
    <main class="game-container">
        <div class="welcome">
            <h1>Ludo</h1>
            <p class="subtitle">Strategy. Luck. Chaos.</p>
            <p class="description">welcome to the ultimate ludo game.</p>
            <label for="activePlayers">Select players: </label>
            <select name="activePlayers" id="active-players">
                <option value="red">red</option>
                <option value="green">green</option>
                <option value="yellow">yellow</option>
                <option value="blue">blue</option>
            </select>
            <button>new game vs computer</button>
            <button id="human">new game vs human</button>
        </div>

        <!-- Game UI -->
        <div class="game-ui" id="game-ui">
            <header class="top-bar">
                <h1>Ludo</h1>
                <div id="turn-indicator">Current: Red</div>
            </header>

            <section class="board-area">
                <div id="game-board"></div>
            </section>
            
            <footer class="controls">
                <div id="dice"></div>
            </footer>
        </div>
    </main>
</body>
</html>
