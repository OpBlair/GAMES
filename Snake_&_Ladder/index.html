<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <main class="game-container">
        <div class="welcome" id="welcome-screen">
            <h1>Snake & Ladder</h1>
            <p class="subtitle">Morals. Luck. Chaos.</p>
                
            <div class="setup-group">
               <label for="humanNumber">Human Players:</label>
                <input type="number" id="humanNumber" min="1" max="4" value="1">
            </div>

            <div class="setup-group">
                <label for="computerNumber">Computer Bots:</label>
                <input type="number" id="computerNumber" min="0" max="3" value="1">
            </div>

            <button id="start-game-btn" style="padding: 10px 20px; cursor: pointer;">Start Game</button>
        </div>
        
        <!-- Game UI -->
        <div class="game-ui" id="game-ui" style="display: none;">
            <header class="top-bar">
                <h1>Snake & Ladder</h1>
            </header>

            <aside class="game-sidebar">
                <div class="turn-indicator">
                    <h3>Turn</h3>
                    <div id="active-player" class="pawn-preview"></div>
                </div>
                <div class="player-leaderboard">
                    <h3>Player Stats</h3>
                    <div id="player-list"></div>
                </div>
                <div class="player-lobby-section">
                    <h3>Waiting</h3>
                    <div class="player-lobby"></div>
                </div>
            </aside>

            <section class="board-area">
                <div class="board-wrapper">
                    <div id="game-board"></div>
                    <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
                    </svg>
                </div>
            </section>
            
            <footer class="controls">
                <div class="dice-container">
                    <div id="dice"></div>
                </div>
            </footer>
        </div>
    </main>
</body>
</html>
