<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <main class="game-container">
        <div class="welcome" id="welcome-screen">
        <div class="brand-header">
            <h1>Snake &amp; Ladder</h1>
            <p class="subtitle">Morals. Luck. Chaos.</p>
        </div>
            
        <div class="setup-container">
            <div class="setup-card">
                <div class="card-icon">👤</div>
                <div class="card-controls">
                    <label for="humanNumber">Human Players</label>
                    <div class="number-wrapper">
                        <input type="number" id="humanNumber" min="0" max="4" value="1" readonly>
                        <div class="stepper-buttons">
                            <button type="button" onclick="document.getElementById('humanNumber').stepUp()">▲</button>
                            <button type="button" onclick="document.getElementById('humanNumber').stepDown()">▼</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="setup-card">
                <div class="card-icon">🤖</div>
                <div class="card-controls">
                    <label for="computerNumber">Computer Bots</label>
                    <div class="number-wrapper">
                        <input type="number" id="computerNumber" min="0" max="3" value="1" readonly>
                        <div class="stepper-buttons">
                            <button type="button" onclick="document.getElementById('computerNumber').stepUp()">▲</button>
                            <button type="button" onclick="document.getElementById('computerNumber').stepDown()">▼</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button id="start-game-btn">
            <span>Start Match</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>
        
        <!-- Game UI -->
        <div class="game-ui" id="game-ui" style="display: none;">
            <header class="top-bar">
                <h1>Snake & Ladder</h1>
            </header>

            <aside class="game-sidebar">
                <div class="turn-indicator">
                    <h3>Turn</h3>
                    <div id="active-player" class="pawn-preview"></div>
                </div>
                <div class="player-leaderboard">
                    <h3>Player Stats</h3>
                    <div id="player-list"></div>
                </div>
                <div class="player-lobby-section">
                    <h3>Waiting</h3>
                    <div class="player-lobby"></div>
                </div>
            </aside>

            <section class="board-area">
                <div class="board-wrapper">
                    <div id="game-board"></div>
                    <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
                    </svg>
                </div>
            </section>
            
            <footer class="controls">
                <div class="dice-container">
                    <div id="dice"></div>
                </div>
            </footer>
        </div>
    </main>
</body>
</html>
