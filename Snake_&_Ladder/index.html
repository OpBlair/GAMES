<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <main class="game-container">
        <div class="welcome" style="display: none;">
            <h1>Snake & Ladder</h1>
            <p class="subtitle">Morales. Luck. Chaos.</p>
            <p class="description">welcome to Snake & Ladder game.</p>
        </div>
        
        <!-- Game UI -->
        <div class="game-ui" id="game-ui">
            <header class="top-bar">
                <h1>Snake & Ladder</h1>
            </header>

            <section class="board-area">
                <div class="board-wrapper">
                    <div class="player-lobby"></div>
                    <div id="game-board"></div>
                    <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
                    </svg>
                </div>
            </section>
            
            <footer class="controls">
                <div id="dice"></div>
            </footer>
        </div>
    </main>
</body>
</html>
